<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:#1a1a1a}
.app{background:#1c1c1e;height:100vh;padding:1.5rem;padding-bottom:calc(1.5rem + 58px);font-family:var(--font-sans);display:flex;flex-direction:column;overflow:hidden}
.header{text-align:center;margin-bottom:1.5rem;flex-shrink:0}
.header h1{font-size:22px;font-weight:500;color:#f5f5f5;letter-spacing:0.04em}
.header p{font-size:13px;color:#888;margin-top:4px}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:1rem;flex:1;min-height:0}
.col{background:#252528;border-radius:12px;padding:1rem;display:flex;flex-direction:column;overflow:hidden}
#checklist-list,#rules-list{flex:1;overflow-y:auto;min-height:0;padding-right:2px}
#checklist-list::-webkit-scrollbar,#rules-list::-webkit-scrollbar{width:4px}
#checklist-list::-webkit-scrollbar-track,#rules-list::-webkit-scrollbar-track{background:transparent}
#checklist-list::-webkit-scrollbar-thumb,#rules-list::-webkit-scrollbar-thumb{background:#3a3a3e;border-radius:4px}
.col-title{font-size:13px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:0.5px solid #333}
.item-wrap{margin-bottom:6px}
.item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;border:0.5px solid #333;background:#2c2c30;transition:background 0.15s,border-color 0.15s;user-select:none}
.item-wrap.has-chips .item,.item-wrap.editor-open .item{border-radius:8px 8px 0 0;border-bottom-color:#202024}
.item.checked{background:#1a2e1a;border-color:#2d5a2d}
.item-wrap.has-chips .item.checked,.item-wrap.editor-open .item.checked{border-bottom-color:#202024}
.item-chips{display:flex;flex-wrap:wrap;gap:5px;padding:7px 10px;background:#202024;border:0.5px solid #333;border-top:none;border-radius:0 0 8px 8px}
.item-wrap.has-chips.editor-open .item-chips{border-radius:0;border-bottom:none}
.chip{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;border:0.5px solid #3a3a3e;background:#2c2c30;color:#777;cursor:pointer;transition:all 0.15s;user-select:none}
.chip:hover{border-color:#666;color:#ccc}
.chip.selected{background:#1f1200;border-color:#f97316;color:#f97316}
.item.dragging{opacity:0.4}
.item.drag-over{border-color:#f97316;background:#2a2420}
.drag-handle{color:#555;cursor:grab;font-size:16px;flex-shrink:0}
.drag-handle:active{cursor:grabbing}
.item-num{font-size:12px;color:#666;min-width:18px;flex-shrink:0}
.item-text{font-size:14px;color:#e0e0e0;flex:1}
.item.checked .item-text{color:#4ade80}
.star{font-size:14px;color:#f97316;flex-shrink:0}
.item.checked .star{color:#4ade80}
.opts-btn{opacity:0;background:none;border:none;color:#666;cursor:pointer;font-size:15px;padding:2px 4px;border-radius:4px;flex-shrink:0;transition:opacity 0.15s,color 0.15s}
.item:hover .opts-btn{opacity:1}
.opts-btn:hover{color:#f97316}
.opts-btn.active{opacity:1;color:#f97316}
.del-btn{background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:2px 4px;border-radius:4px;flex-shrink:0;transition:color 0.15s}
.del-btn:hover{color:#ef4444}
.opts-editor{background:#1e1e22;border:0.5px solid #333;border-top:none;border-radius:0 0 8px 8px;padding:10px 12px}
.opts-editor-title{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.opts-empty{font-size:12px;color:#444;margin-bottom:8px}
.opt-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.opt-row input{flex:1;background:#2c2c30;border:0.5px solid #444;border-radius:6px;padding:5px 8px;font-size:12px;color:#e0e0e0;outline:none}
.opt-row input:focus{border-color:#f97316}
.opt-del{background:none;border:none;color:#555;cursor:pointer;font-size:14px;padding:2px 4px;border-radius:4px;transition:color 0.15s;flex-shrink:0}
.opt-del:hover{color:#ef4444}
.add-opt-row{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:0.5px solid #2a2a2e}
.add-opt-row input{flex:1;background:#2c2c30;border:0.5px solid #444;border-radius:6px;padding:5px 8px;font-size:12px;color:#e0e0e0;outline:none}
.add-opt-row input:focus{border-color:#f97316}
.add-opt-row input::placeholder{color:#555}
.add-opt-btn{background:#f97316;border:none;border-radius:6px;padding:5px 12px;font-size:12px;color:#fff;cursor:pointer;font-weight:500;flex-shrink:0}
.add-opt-btn:hover{background:#ea6a0a}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-row input{flex:1;background:#1c1c1e;border:0.5px solid #444;border-radius:8px;padding:8px 12px;font-size:13px;color:#e0e0e0;outline:none}
.add-row input:focus{border-color:#f97316}
.add-row input::placeholder{color:#555}
.add-btn{background:#f97316;border:none;border-radius:8px;padding:8px 14px;font-size:13px;color:#fff;cursor:pointer;font-weight:500;flex-shrink:0}
.add-btn:hover{background:#ea6a0a}
.market-bar{display:flex;gap:8px;background:#2c2c30;border:0.5px solid #333;border-radius:10px;padding:10px;margin-bottom:10px}
.market-btn{flex:1;padding:9px 0;border-radius:10px;border:0.5px solid #3a3a3e;background:#252528;font-size:13px;font-weight:600;color:#555;cursor:pointer;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s}
.market-btn:hover{border-color:#666;color:#888}
.market-btn.trending{background:#1e1800;border-color:#a07c00;color:#f5c518;box-shadow:0 0 12px rgba(245,197,24,0.15)}
.market-btn.ranging{background:#222225;border-color:#666;color:#9ca3af;box-shadow:0 0 12px rgba(156,163,175,0.1)}
.market-btn.bull{background:#0f2a1a;border-color:#16a34a;color:#4ade80;box-shadow:0 0 12px rgba(74,222,128,0.15)}
.market-btn.bear{background:#2a0f0f;border-color:#dc2626;color:#f87171;box-shadow:0 0 12px rgba(248,113,113,0.15)}
.reset-btn{display:block;margin:1.2rem auto 0;background:none;border:0.5px solid #444;border-radius:8px;padding:6px 18px;font-size:12px;color:#666;cursor:pointer;flex-shrink:0}
.reset-btn:hover{border-color:#666;color:#999}

@supports (height:100dvh){.app{height:100dvh}}

@media (max-width:640px){
  html,body{overflow:auto;height:auto}
  .app{height:auto;min-height:100svh;overflow:visible;padding:1rem;padding-bottom:calc(1rem + 90px)}
  .header{margin-bottom:1rem}
  .columns{grid-template-columns:1fr;flex:none;min-height:auto;gap:0.75rem}
  .col{overflow:visible}
  #checklist-list,#rules-list{flex:none;max-height:42vh;overflow-y:auto}
  .add-row input,.add-opt-row input,.opt-row input{font-size:16px}
  .item{padding:12px 10px}
  .market-btn{padding:11px 0;font-size:12px}
  .add-btn,.add-opt-btn{font-size:14px}
  .reset-btn{margin-bottom:1rem}
  #timer-bar{padding:10px 1rem;gap:8px;flex-wrap:wrap}
  .timer-label{display:none}
  #timer-display{font-size:22px;min-width:62px}
  .timer-set input{width:46px;font-size:16px;padding:6px}
  .timer-btns{width:100%;justify-content:center;margin-left:0;gap:10px}
  .timer-btn{flex:1;max-width:100px;padding:8px 0;font-size:13px;text-align:center}
}

@media (min-width:641px) and (max-width:1024px){
  .app{padding:1.2rem;padding-bottom:calc(1.2rem + 58px)}
  .header h1{font-size:20px}
}
#timer-bar{position:fixed;bottom:0;left:0;right:0;background:#18181b;border-top:0.5px solid #2e2e32;padding:12px 1.5rem;display:flex;align-items:center;gap:14px;z-index:200;user-select:none}
#timer-display{font-size:26px;font-weight:700;color:#f5f5f5;font-variant-numeric:tabular-nums;letter-spacing:0.02em;min-width:74px}
.timer-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.08em;flex-shrink:0}
.timer-set{display:flex;align-items:center;gap:6px}
.timer-set input{width:50px;background:#2c2c30;border:0.5px solid #444;border-radius:7px;padding:6px 8px;font-size:14px;color:#e0e0e0;text-align:center;outline:none;-moz-appearance:textfield}
.timer-set input::-webkit-inner-spin-button,.timer-set input::-webkit-outer-spin-button{-webkit-appearance:none}
.timer-set input:focus{border-color:#f97316}
.timer-set span{color:#555;font-size:16px;font-weight:300}
.timer-btns{display:flex;gap:8px;margin-left:auto}
.timer-btn{background:#2c2c30;border:0.5px solid #444;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:500;color:#bbb;cursor:pointer;transition:background 0.15s,color 0.15s;flex-shrink:0}
.timer-btn:hover{background:#3a3a3e;color:#fff}
.timer-btn.go{background:#f97316;border-color:#f97316;color:#fff}
.timer-btn.go:hover{background:#ea6a0a}
#timer-bar.done{cursor:pointer}
#timer-bar.done #timer-display{color:#f97316}
@keyframes timerFlicker{0%,100%{opacity:1}45%{opacity:0.08}55%{opacity:0.08}}
#timer-bar.done{animation:timerFlicker 0.55s ease-in-out infinite}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">FX Boyz trading checklist and rules manager</h2>

<div class="app">
  <div class="header">
    <h1>FX BOYZ</h1>
    <p>Rules + Checklist</p>
  </div>
  <div class="columns">
    <div class="col">
      <div class="col-title">Checklist</div>
      <div class="market-bar">
        <button class="market-btn" id="btn-ranging" onclick="setMarket('ranging')">Ranging</button>
        <button class="market-btn" id="btn-trending" onclick="setMarket('trending')">Trending</button>
      </div>
      <div class="market-bar">
        <button class="market-btn" id="btn-bull" onclick="setBias('bull')">Bull</button>
        <button class="market-btn" id="btn-bear" onclick="setBias('bear')">Bear</button>
      </div>
      <div id="checklist-list"></div>
      <div class="add-row">
        <input id="checklist-input" placeholder="Add checklist item..." />
        <button class="add-btn" onclick="addItem('checklist')">Add</button>
      </div>
    </div>
    <div class="col">
      <div class="col-title">Rules</div>
      <div id="rules-list"></div>
      <div class="add-row">
        <input id="rules-input" placeholder="Add rule..." />
        <button class="add-btn" onclick="addItem('rules')">Add</button>
      </div>
    </div>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset all checks</button>
</div>

<div id="timer-bar">
  <span class="timer-label">Timer</span>
  <div id="timer-display">00:00</div>
  <div class="timer-set" id="timer-set">
    <input id="timer-min" type="number" min="0" max="99" placeholder="mm" />
    <span>:</span>
    <input id="timer-sec" type="number" min="0" max="59" placeholder="ss" />
  </div>
  <div class="timer-btns">
    <button class="timer-btn go" id="timer-start-btn" onclick="timerStart()">Start</button>
    <button class="timer-btn" id="timer-pause-btn" onclick="timerPause()" style="display:none">Pause</button>
    <button class="timer-btn" id="timer-reset-btn" onclick="timerReset()">Reset</button>
  </div>
</div>

<script>
const DEFAULT = {
  marketCondition:"",
  marketBias:"",
  checklist:[
    {id:1,text:"Ranging or trending (Bull/Bear)",checked:false,options:[],selectedOptions:[]},
    {id:2,text:"Mark the following",checked:false,options:[],selectedOptions:[]},
    {id:3,text:"Break out",checked:false,options:[],selectedOptions:[]},
    {id:4,text:"Daily H+L, Session H+L",checked:false,options:[],selectedOptions:[]},
    {id:5,text:"Order blocks & Breaker blocks",checked:false,options:[],selectedOptions:[]},
    {id:6,text:"Support + Resistance",checked:false,options:[],selectedOptions:[]},
    {id:7,text:"Higher time frame block",checked:false,options:[],selectedOptions:[]},
    {id:8,text:"Apply volume tool",checked:false,options:[],selectedOptions:[]}
  ],
  rules:[
    {id:101,text:"Do not enter rushed",checked:false},
    {id:102,text:"20 minute timer after loss",checked:false},
    {id:103,text:"Do not reuse blocks over 2 times",checked:false},
    {id:104,text:"Rule 4 — tap to edit",checked:false},
    {id:105,text:"Rule 5 — tap to edit",checked:false},
    {id:106,text:"Rule 6 — tap to edit",checked:false}
  ]
};

let state;
function load(){
  try{const s=localStorage.getItem('fxboyz');if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){try{localStorage.setItem('fxboyz',JSON.stringify(state));}catch(e){}}

function setMarket(val){
  state.marketCondition=state.marketCondition===val?'':val;
  save();renderMarket();
}
function setBias(val){
  state.marketBias=state.marketBias===val?'':val;
  save();renderMarket();
}
function renderMarket(){
  const mc=state.marketCondition||'';
  const mb=state.marketBias||'';
  document.getElementById('btn-trending').className='market-btn'+(mc==='trending'?' trending':'');
  document.getElementById('btn-ranging').className='market-btn'+(mc==='ranging'?' ranging':'');
  document.getElementById('btn-bull').className='market-btn'+(mb==='bull'?' bull':'');
  document.getElementById('btn-bear').className='market-btn'+(mb==='bear'?' bear':'');
}

function escHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const openEditors=new Set();
let dragSrc=null,dragCol=null;

function render(){
  ['checklist','rules'].forEach(col=>{
    const el=document.getElementById(col+'-list');
    el.innerHTML='';
    state[col].forEach((item,i)=>{
      if(col==='checklist'){
        if(!item.options)item.options=[];
        if(!Array.isArray(item.selectedOptions))item.selectedOptions=item.selectedOption?[item.selectedOption]:[];
      }

      const editorOpen=col==='checklist'&&openEditors.has(item.id);
      const hasOpts=col==='checklist'&&item.options&&item.options.length>0;

      const wrap=document.createElement('div');
      wrap.className='item-wrap'+(hasOpts?' has-chips':'')+(editorOpen?' editor-open':'');

      const div=document.createElement('div');
      div.className='item'+(item.checked?' checked':'');
      div.draggable=true;
      div.dataset.idx=i;
      div.dataset.col=col;

      const optsBtn=col==='checklist'
        ?`<button class="opts-btn${editorOpen?' active':''}" title="Manage options" onclick="toggleEditor('${col}',${i},event)">&#9776;</button>`
        :'';

      div.innerHTML=`<span class="drag-handle" aria-hidden="true"><i class="ti ti-grip-vertical"></i></span><span class="item-num">${i+1}</span><span class="star" aria-hidden="true">✦</span><span class="item-text">${escHtml(item.text)}</span>${optsBtn}<button class="del-btn" aria-label="Delete item" onclick="delItem('${col}',${i},event)">&#x2715;</button>`;

      div.addEventListener('click',()=>toggleItem(col,i));
      div.addEventListener('dragstart',e=>{dragSrc=i;dragCol=col;div.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
      div.addEventListener('dragend',()=>{document.querySelectorAll('.item').forEach(x=>x.classList.remove('dragging','drag-over'));});
      div.addEventListener('dragover',e=>{e.preventDefault();div.classList.add('drag-over');});
      div.addEventListener('dragleave',()=>div.classList.remove('drag-over'));
      div.addEventListener('drop',e=>{e.preventDefault();div.classList.remove('drag-over');if(dragCol===col&&dragSrc!==null&&dragSrc!==i){const arr=state[col];const[moved]=arr.splice(dragSrc,1);arr.splice(i,0,moved);save();render();}dragSrc=null;dragCol=null;});

      wrap.appendChild(div);

      if(hasOpts){
        const chips=document.createElement('div');
        chips.className='item-chips';
        chips.onclick=e=>e.stopPropagation();
        item.options.forEach(o=>{
          const chip=document.createElement('button');
          chip.className='chip'+(item.selectedOptions.includes(o)?' selected':'');
          chip.textContent=o;
          chip.onclick=e=>{e.stopPropagation();selectOption(col,i,o);};
          chips.appendChild(chip);
        });
        wrap.appendChild(chips);
      }

      if(editorOpen){
        const editor=document.createElement('div');
        editor.className='opts-editor';
        editor.onclick=e=>e.stopPropagation();
        const opts=item.options||[];
        editor.innerHTML=`
          <div class="opts-editor-title">Options</div>
          ${opts.length===0?'<div class="opts-empty">No options yet — add one below.</div>':''}
          ${opts.map((o,oi)=>`
            <div class="opt-row">
              <input value="${escHtml(o)}" onchange="editOption('${col}',${i},${oi},this.value)" />
              <button class="opt-del" title="Remove option" onclick="deleteOption('${col}',${i},${oi})">&#10005;</button>
            </div>
          `).join('')}
          <div class="add-opt-row">
            <input id="add-opt-${item.id}" placeholder="New option..." onkeydown="if(event.key==='Enter')addOption('${col}',${i})" />
            <button class="add-opt-btn" onclick="addOption('${col}',${i})">Add</button>
          </div>
        `;
        wrap.appendChild(editor);
      }

      el.appendChild(wrap);
    });
  });
}

function toggleItem(col,i){state[col][i].checked=!state[col][i].checked;save();render();}
function delItem(col,i,e){e.stopPropagation();state[col].splice(i,1);save();render();}

function addItem(col){
  const inp=document.getElementById(col+'-input');
  const txt=inp.value.trim();
  if(!txt)return;
  const ids=state[col].map(x=>x.id);
  const newId=(ids.length?Math.max(...ids):0)+1;
  const item={id:newId,text:txt,checked:false};
  if(col==='checklist'){item.options=[];item.selectedOption='';}
  state[col].push(item);
  inp.value='';
  save();render();
}

function resetAll(){
  state.checklist.forEach(x=>{x.checked=false;});
  state.rules.forEach(x=>x.checked=false);
  save();render();
}

function toggleEditor(col,i,e){
  e.stopPropagation();
  const id=state[col][i].id;
  if(openEditors.has(id))openEditors.delete(id);
  else openEditors.add(id);
  render();
  if(openEditors.has(id)){
    const inp=document.getElementById('add-opt-'+id);
    if(inp)inp.focus();
  }
}

function selectOption(col,i,val){
  const item=state[col][i];
  if(!Array.isArray(item.selectedOptions))item.selectedOptions=[];
  const idx=item.selectedOptions.indexOf(val);
  if(idx===-1)item.selectedOptions.push(val);
  else item.selectedOptions.splice(idx,1);
  save();render();renderMarket();
}

function addOption(col,i){
  const item=state[col][i];
  const inp=document.getElementById('add-opt-'+item.id);
  const val=inp.value.trim();
  if(!val)return;
  if(!item.options)item.options=[];
  item.options.push(val);
  save();render();
  const newInp=document.getElementById('add-opt-'+item.id);
  if(newInp)newInp.focus();
}

function deleteOption(col,i,oi){
  const item=state[col][i];
  const removed=item.options[oi];
  item.options.splice(oi,1);
  if(Array.isArray(item.selectedOptions))item.selectedOptions=item.selectedOptions.filter(o=>o!==removed);
  save();render();
}

function editOption(col,i,oi,val){
  const item=state[col][i];
  const old=item.options[oi];
  const trimmed=val.trim();
  if(!Array.isArray(item.selectedOptions))item.selectedOptions=[];
  if(!trimmed){
    item.options.splice(oi,1);
    item.selectedOptions=item.selectedOptions.filter(o=>o!==old);
  } else {
    const si=item.selectedOptions.indexOf(old);
    if(si!==-1)item.selectedOptions[si]=trimmed;
    item.options[oi]=trimmed;
  }
  save();render();
}

document.getElementById('checklist-input').addEventListener('keydown',e=>{if(e.key==='Enter')addItem('checklist');});
document.getElementById('rules-input').addEventListener('keydown',e=>{if(e.key==='Enter')addItem('rules');});

state=load();
if(!state.marketCondition)state.marketCondition='';
if(!state.marketBias)state.marketBias='';
render();
renderMarket();

// --- Timer ---
let timerInterval=null,timerLeft=0,timerRunning=false,timerFinished=false;

function timerFmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}

function timerTick(){
  timerLeft--;
  document.getElementById('timer-display').textContent=timerFmt(timerLeft);
  if(timerLeft<=0){
    clearInterval(timerInterval);timerInterval=null;timerRunning=false;timerFinished=true;
    const bar=document.getElementById('timer-bar');
    bar.classList.add('done');
    bar.addEventListener('click',timerDismiss);
  }
}

function timerDismiss(){timerReset();}

function timerStart(){
  if(timerRunning)return;
  if(!timerFinished&&timerLeft===0){
    const m=parseInt(document.getElementById('timer-min').value)||0;
    const s=parseInt(document.getElementById('timer-sec').value)||0;
    timerLeft=m*60+s;
    if(timerLeft<=0)return;
  }
  timerFinished=false;
  const bar=document.getElementById('timer-bar');
  bar.classList.remove('done');
  bar.removeEventListener('click',timerDismiss);
  document.getElementById('timer-set').style.display='none';
  document.getElementById('timer-start-btn').style.display='none';
  document.getElementById('timer-pause-btn').style.display='';
  document.getElementById('timer-display').textContent=timerFmt(timerLeft);
  timerRunning=true;
  timerInterval=setInterval(timerTick,1000);
}

function timerPause(){
  clearInterval(timerInterval);timerInterval=null;timerRunning=false;
  document.getElementById('timer-start-btn').textContent='Resume';
  document.getElementById('timer-start-btn').style.display='';
  document.getElementById('timer-pause-btn').style.display='none';
}

function timerReset(){
  clearInterval(timerInterval);timerInterval=null;timerRunning=false;timerFinished=false;timerLeft=0;
  const bar=document.getElementById('timer-bar');
  bar.classList.remove('done');
  bar.removeEventListener('click',timerDismiss);
  document.getElementById('timer-display').textContent='00:00';
  document.getElementById('timer-set').style.display='';
  document.getElementById('timer-start-btn').style.display='';
  document.getElementById('timer-start-btn').textContent='Start';
  document.getElementById('timer-pause-btn').style.display='none';
  document.getElementById('timer-min').value='';

}

document.getElementById('timer-min').addEventListener('keydown',e=>{if(e.key==='Enter')timerStart();});
document.getElementById('timer-sec').addEventListener('keydown',e=>{if(e.key==='Enter')timerStart();});
